<!doctype html>
<html>
  <head>
    <title>Gallery</title>
    <style>
      .gallery {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 20px;
      }
      .gallery img {
        object-fit: cover;
        width: 100%;
        height: auto;
        border-radius: 10px;
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .gallery img:hover {
        transform: scale(1.05);
      }
      .gallery-content {
        padding: 10px 0;
        font-size: 16px;
        font-weight: 600;
      }
      .gallery-text {
        text-decoration: none;
        color: black;
        text-align: center;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div class="gallery">
      <img src="../images/akasaganga1.png" alt="akasaganga" />
      <img src="../images/appalayagunta.png" alt="tirumala temple" />
