
<!doctype html>
<html>
  <head>
    <title>Feedback</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f6f9;
        font-family: Arial, sans-serif;
      }

      .form-container {
        background: white;
        padding: 30px;
        width: 350px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        position: relative;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #0077cc;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      button:hover {
        background: #005fa3;
      }

      /* Popup Styling */
      .popup {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #4caf50;
        color: white;
        padding: 15px 20px;
        border-radius: 5px;
        display: none;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.3s ease-in-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
    <script>
      (function () {
        emailjs.init("sNg6ws2auF5IMqXbM");
      })();
    </script>
  </head>

  <body>
    <div class="form-container">
      <form id="feedback-form">
        <h2>Feedback Form</h2>

        <label>Name</label>
        <input type="text" name="name" required />

        <label>Place</label>
        <input type="text" name="place" required />

        <label>Your Feedback</label>
        <textarea name="feedback" rows="5" required></textarea>

        <button type="submit">Submit Feedback</button>
      </form>
    </div>

    <!-- Popup -->
    <div class="popup" id="successPopup">
      ✅ Feedback submitted successfully!
    </div>

    <script>
      document
        .getElementById("feedback-form")
        .addEventListener("submit", function (event) {
          event.preventDefault();

          emailjs.sendForm("service_ltcucdn", "template_i73of4q", this).then(
            function () {
              alert("Thank you! Feedback sent successfully.");
              document.getElementById("feedback-form").reset();
            },
            function (error) {
              alert("Failed to send feedback. Please try again.");
            },
          );
        });
    </script>
  </body>
</html>
>
